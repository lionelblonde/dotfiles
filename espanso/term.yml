matches:
  - trigger: ":gpom"
    replace: "git push origin main"
  - trigger: ":gpom"
    replace: "git push origin master"

  - trigger: ":qq"
    replace: "watch -n 3 squeue -u $(whoami) -O jobid,state,timeused,timelimit,reason --sort='t,-S'"
  - trigger: ":sc"
    replace: "scancel -u $(whoami)"

  - trigger: ":toucha"
    replace: "find . -exec touch {} +"

  - trigger: ":sva"
    replace: "source .venv/bin/activate"

  - trigger: ":shebang"
    replace: "#!/usr/bin/env bash"

  - trigger: ":tcli"
    replace: "transmission-cli --encryption-required  '{{clipb}}'"
    vars:
      - name: "clipb"
        type: "clipboard"
